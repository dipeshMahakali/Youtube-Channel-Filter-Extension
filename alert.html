<!DOCTYPE html>
<html>
<head>
    <title>YouTube Play All - Finished</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            max-width: 80%;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 600;
        }
        p {
            margin: 0 0 30px 0;
            color: #aaaaaa;
            font-size: 16px;
            line-height: 1.5;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2);
        }
        button:hover {
            background: #e60000;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.3);
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">✅</span>
        <h1>Playlist Ended</h1>
        <p>Your YouTube Play All session is complete.<br>All videos have been played.</p>
        <button id="close-btn">Awesome!</button>
    </div>
    <script src="alert.js"></script>
</body>
</html>
